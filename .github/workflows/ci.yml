name: UI Automation Suite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run the test suite? (true / false)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      parallel_mode:
        description: "Parallel mode"
        required: true
        default: "classes"
        type: choice
        options:
          - "classes"
          - "methods"

jobs:
  test:
    name: Run Selenium Suite
    runs-on: ubuntu-latest

    # Skip the job when triggered manually with run_tests = false.
    # Push / PR triggers always run (run_tests input is not set, so the
    # condition evaluates to true).
    if: ${{ github.event.inputs.run_tests != 'false' }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # ── 3. Chrome (latest stable, pre-installed on ubuntu-latest) ────────────
      - name: Verify Chrome installation
        run: google-chrome --version

      # ── 4. Determine TestNG suite file ───────────────────────────────────────
      #    Push / PR → testng-ci.xml (no DB, safe for cloud runners)
      #    Manual dispatch → testng-{classes|methods}.xml (full suite)
      - name: Set suite file
        id: suite
        run: |
          EVENT="${{ github.event_name }}"
          MODE="${{ github.event.inputs.parallel_mode }}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "file=testng-${MODE}.xml" >> "$GITHUB_OUTPUT"
          else
            echo "file=testng-ci.xml" >> "$GITHUB_OUTPUT"
          fi

      # ── 5. Run tests ─────────────────────────────────────────────────────────
      #    Only APP_USERNAME and APP_PASSWORD needed for CI suite (no DB tests).
      - name: Run test suite
        env:
          APP_USERNAME: ${{ secrets.APP_USERNAME }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          mvn test \
            -DsuiteXmlFile=${{ steps.suite.outputs.file }} \
            -Dheadless=true \
            --no-transfer-progress

      # ── 6. Upload ExtentReport ────────────────────────────────────────────────
      #    Runs even if tests fail so the report is always available.
      - name: Upload ExtentReport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ github.run_number }}
          path: |
            reports/ExtentReport.html
            reports/screenshots/
          retention-days: 30