name: UI Automation Suite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run the test suite? (true / false)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      suite_type:
        description: "Select TestNG Suite / Parallel Mode"
        required: true
        default: "ci"
        type: choice
        options:
          - "ci"
          - "classes"
          - "methods"

jobs:
  test:
    name: Run Selenium Suite
    runs-on: ubuntu-latest

    # Skip the job when triggered manually with run_tests = false.
    # Push / PR triggers always run (run_tests input is not set, so condition is true).
    if: ${{ github.event.inputs.run_tests != 'false' }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # ── 3. Chrome ────────────────────────────────────────────────────────────
      - name: Verify Chrome installation
        run: google-chrome --version

      # ── 4. Determine TestNG suite file ───────────────────────────────────────
      # Push / PR -> defaults to testng-ci.xml
      # Manual -> Uses the selection from the dropdown (ci, classes, or methods)
      - name: Set suite file
        id: suite
        run: |
          EVENT="${{ github.event_name }}"
          # Get the selection from the manual input dropdown
          SELECTED_TYPE="${{ github.event.inputs.suite_type }}"
          
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "file=testng-${SELECTED_TYPE}.xml" >> "$GITHUB_OUTPUT"
            echo "Selected manual suite: testng-${SELECTED_TYPE}.xml"
          else
            echo "file=testng-ci.xml" >> "$GITHUB_OUTPUT"
            echo "Defaulting to CI suite for automated trigger"
          fi

      # ── 5. Run tests ─────────────────────────────────────────────────────────
      - name: Run test suite
        env:
          APP_USERNAME: ${{ secrets.APP_USERNAME }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          mvn test \
            -DsuiteXmlFile=${{ steps.suite.outputs.file }} \
            -Dheadless=true \
            --no-transfer-progress

      # ── 6. Upload ExtentReport ────────────────────────────────────────────────
      - name: Upload ExtentReport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ github.run_number }}
          path: |
            reports/ExtentReport.html
            reports/screenshots/
          retention-days: 30
